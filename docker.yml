name: Build and Push Docker Images

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Backend Image
        run: |
          docker build -t sanjaydocker45/mean-app-backend:latest ./backend
          docker push sanjaydocker45/mean-app-backend:latest

      - name: Build Frontend Image
        run: |
          docker build -t sanjaydocker45/mean-app-frontend:latest ./frontend
          docker push sanjaydocker45/mean-app-frontend:latest